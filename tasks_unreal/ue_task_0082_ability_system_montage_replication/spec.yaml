  mode: listen_server
  num_clients: 1
  filter: "GASShooter.AbilitySystem"

hidden_requirements:
  R1:
    text: Ability input must route through the Gameplay Ability System, including generic confirm and cancel before ordinary ability activation.
    category: core_logic
  R2:
    text: Input-activated abilities must only auto-activate when the ability is configured for input activation.
    category: core_logic
  R3:
    text: Weapon ability batching must preserve activation, target-data submission, and optional same-frame ability ending through GAS prediction/RPC paths.
    category: replication
  R4:
    text: Local gameplay cue helpers must execute, add, and remove cosmetic cues without requiring replicated gameplay effects.
    category: effects
  R5:
    text: Gameplay effect Blueprint helpers must use prediction keys when available and fall back safely when prediction is unavailable.
    category: prediction
  R6:
    text: Ability lookup and gameplay-tag-count helpers must expose usable Blueprint and C++ query surfaces.
    category: api_contract
  R7:
    text: Ability end cleanup must clear montage state owned by the ending ability without disrupting unrelated montage channels.
    category: lifecycle
  R8:
    text: Multi-mesh montage playback must maintain independent mesh state and replicated montage correction for local, authority, and simulated-proxy roles.
    category: replication
  R9:
    text: Replicated montage data that arrives before actor info is ready must be deferred and consumed after ability actor info initialization.
    category: lifecycle

test_requirements:
  GASShooter.AbilitySystem.input_activation_and_confirm_cancel_paths_present:
    - R1
    - R2
    - R6
  GASShooter.AbilitySystem.prediction_batching_and_local_cues_present:
    - R3
    - R4
    - R5
  GASShooter.AbilitySystem.multi_mesh_montage_replication_state_present:
    - R7
    - R8
    - R9
