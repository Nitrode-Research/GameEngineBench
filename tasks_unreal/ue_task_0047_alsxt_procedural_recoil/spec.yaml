task_id: ue_task_0047
title: ALSXT Procedural Recoil
tier: hard

instruction: |
  You are working in an Unreal Engine 5 third-person character project that uses the ALSXT plugin.
  Implement the procedural recoil animation system in AlsxtProceduralRecoilAnimComponent.cpp.

  The component manages the recoil timeline setup and update flow, a state machine for single-fire
  versus sustained-fire behavior, controller recoil smoothing and damping, random kick and sway
  generation from settings, owner versus non-owner replication behavior for output transforms,
  readiness and aiming-dependent scaling, and fire-rate-based timing and correction logic.

  The project already contains:
  - The component class and its public API
  - Settings data assets and the attribute-set type definitions
  - Replicated properties and delegates
  - The existing firearm and gameplay ability callers

  Implement the following behavior:

  - Firing produces procedural transform recoil and controller kick rather than static offsets.
  - Single-fire and sustained-fire behavior differ in timing and smoothing.
  - Aiming and ready states scale recoil differently using the existing settings.
  - The owning player receives local controller recoil; other players observe the resulting replicated transform on the character.
  - Recoil decays smoothly when firing stops.
  - Fire rate and playback timing remain consistent so automatic fire does not jitter or drift badly.

