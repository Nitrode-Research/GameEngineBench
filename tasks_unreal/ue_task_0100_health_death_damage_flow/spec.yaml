task_id: ue_task_0100
title: Implement health, death, and damage execution flow
tier: hard

instruction: |
  Implement the health, death, and damage flow so characters and damageable
  actors react correctly to gameplay effects in multiplayer.
  
  Expected behavior:
  - Health initializes from the existing attribute set and broadcasts usable initial values to interested systems.
  - Damage and healing effects update health through the existing Gameplay Ability System path.
  - Damage execution accounts for source, target, tags, team or friendly-fire rules, and gameplay effect context.
  - Health changes notify UI, gameplay messages, death checks, and other listeners consistently on server and clients.
  - Reaching zero health starts the existing death flow exactly once and prevents duplicate death handling.
  - Death disables or changes gameplay capability as expected, including movement, ability activation, and interaction with equipment.
  - Respawn or reinitialization restores health state without preserving stale death delegates or old instigator data.
  - Vehicle or non-character health variants continue to work with the same component and attribute patterns.
  - The implementation must compile and fit the existing GAS, pawn, player state, message, and replication architecture.
  
  Constraints:
  - Use the repository to infer attribute sets, effect contexts, gameplay tags, death state transitions, and listener behavior.
  - Do not replace GAS damage with direct health variable mutation.
  - Do not require new assets or hidden manual setup.
  
  Quality bar:
  The implementation must be authoritative, replicated, and lifecycle-safe.
  Correctness requires health UI updates, single-shot death handling, effect
  context preservation, and clean respawn/reinitialization behavior.

