task_id: ue_task_0090
title: Implement actor indicator projection and screen-space layout
tier: hard

instruction: |
  Implement the actor indicator system so world actors can drive correct
  screen-space UI indicators.
  
  Expected behavior:
  - Gameplay code can register, update, and remove actor indicators through the existing manager component.
  - Indicators project actor or component world positions to screen space using the local player's view.
  - On-screen indicators are positioned, aligned, clamped, and layered according to descriptor settings.
  - Off-screen or edge-clamped indicators remain stable and point toward the relevant world target when configured.
  - Hidden, destroyed, unregistered, or invalid targets stop producing visible indicators without crashes.
  - Indicator widgets receive descriptor data needed for distance, visibility, and target-specific presentation.
  - Multiple indicators can coexist and stay stable when the same target is registered more than once.
  - The implementation must compile and fit the existing UI extension, local player, and widget architecture.
  
  Constraints:
  - Use the repository to infer descriptor fields, Slate layout behavior, projection math, manager ownership, and widget lifecycle.
  - Do not implement a separate HUD-only indicator list that bypasses descriptors.
  - Do not require new assets or hidden manual setup.
  
  Quality bar:
  The implementation must be UI-lifecycle-safe and viewport-correct. A solution
  that only places widgets in the happy path but fails off-screen projection,
  target teardown, or multiple indicators is not sufficient.

