tests:
  runner: ue_automation
  mode: listen_server
  num_clients: 1
  filter: "SPUD.PersistentRuntimeRestore"

hidden_requirements:
  R1:
    text: Runtime-spawned persistent actors must be stored by stable SpudGuid identity rather than transient object name, and repeated saves with the same identity must update one spawned record.
    category: core_logic
  R2:
    text: Runtime actors must respawn with their saved class, SaveGame state, stable guid, and repaired strong or weak references to other restored runtime actors.
    category: serialization
  R3:
    text: Runtime actor identity and references must survive a full SPUD archive save/load cycle, not just an in-memory state restore.
    category: serialization
  R4:
    text: Roaming runtime actors must restore as roaming actor classes and preserve runtime actor references after respawn.
    category: runtime_integration
  R5:
    text: Existing runtime actors with the same saved guid must be restored in place rather than duplicated.
    category: object_lifecycle
  R6:
    text: Runtime actors that opt out of respawn and provide a stable override name must be stored as named level actor state, not as spawned actor records.
    category: core_logic
  R7:
    text: Destroyed placed actor records must use stable level actor identity and round-trip through SPUD's archive format.
    category: serialization
  R8:
    text: Destroyed placed actor tombstones must be applied after normal actor restore so saved state and deletion state do not conflict.
    category: object_lifecycle
  R9:
    text: Roaming actor cell lookup must choose the most specific cached cell and report active versus loaded-but-inactive state.
    category: core_logic
  R10:
    text: Roaming actor cell cache must preserve cached cells and mark them pending unload during streaming pre-unload notifications.
    category: runtime_integration
  R11:
    text: Roaming actor tracking operations must dedupe repeated registration and cleanly remove actors on unregister.
    category: object_lifecycle
  R12:
    text: Roaming actors restored near a cell boundary must be clamped inside the target cell with an inset.
    category: core_logic
  R13:
    text: Slow-path property restore must round-trip SaveGame custom structs, fallback containers, and struct arrays while excluding runtime-only fields.
    category: serialization

test_requirements:
  SPUD.PersistentRuntimeRestore.stores_runtime_actor_by_stable_identity:
    - R1
  SPUD.PersistentRuntimeRestore.respawns_runtime_actors_and_fixes_runtime_references:
    - R2
  SPUD.PersistentRuntimeRestore.archive_roundtrip_preserves_runtime_identity_and_references:
    - R3
  SPUD.PersistentRuntimeRestore.restores_roaming_runtime_actors_and_references:
    - R4
  SPUD.PersistentRuntimeRestore.does_not_duplicate_existing_runtime_actor_with_same_guid:
    - R5
  SPUD.PersistentRuntimeRestore.respects_never_respawn_and_override_name_for_auto_created_actors:
    - R6
  SPUD.PersistentRuntimeRestore.records_stable_actor_names_and_roundtrips_archive:
    - R7
  SPUD.PersistentRuntimeRestore.restore_applies_destroyed_records_after_actor_restore:
    - R8
  SPUD.PersistentRuntimeRestore.finds_most_specific_cell_and_reports_activation:
    - R9
  SPUD.PersistentRuntimeRestore.tracks_pending_unload_state:
    - R10
  SPUD.PersistentRuntimeRestore.registers_and_unregisters_unique_actors:
    - R11
  SPUD.PersistentRuntimeRestore.clamps_actor_inside_target_cell:
    - R12
  SPUD.PersistentRuntimeRestore.slow_path_restores_custom_structs_and_fallback_containers:
    - R13
