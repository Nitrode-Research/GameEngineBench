task_id: ue_task_0102
title: Implement interactable target scanning and option generation
tier: hard

instruction: |
  Implement the interactable target scanner so gameplay abilities can discover
  usable interaction options from the world.
  
  Expected behavior:
  - A local player can scan from their view or camera direction and discover nearby interactable actors.
  - The scanner returns interaction options exposed by actors, components, or native interaction interfaces.
  - Line traces and overlap-style targeting respect the existing collision channels and range settings.
  - Duplicate options from the same target are filtered so UI does not show repeated actions.
  - Invalid, hidden, destroyed, or out-of-range targets are ignored safely.
  - The ability task follows Unreal ability-task lifecycle rules and stops ticking or delegating when ended.
  - Interaction option data remains suitable for UI prompts and for the gameplay ability that executes the interaction.
  - The implementation must compile and fit the existing Gameplay Ability System and interaction architecture.
  
  Constraints:
  - Use the repository to infer trace profiles, query objects, option structures, ability task activation rules, and how interactable objects expose options.
  - Do not replace the system with hardcoded actor classes or one-off traces.
  - Do not require new assets or hidden manual setup.
  
  Quality bar:
  The implementation must be robust in normal gameplay and during ability
  cancellation. It should support UI prompt updates without stale options,
  duplicate options, or lingering task work after shutdown.

