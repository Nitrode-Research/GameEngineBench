    category: attributes
  R3:
    text: Character ability grants must be authority-only, duplicate guarded, and use ability level/input/source object data.
    category: abilities
  R4:
    text: Character ability removal must be authority-only, remove only matching startup abilities sourced from the character, and reset the grant flag.
    category: abilities
  R5:
    text: Death must remove abilities, disable collision/movement, broadcast death, cancel abilities, remove death-tagged effects, add DeadTag, play audio, and play montage or finish dying.
    category: death_lifecycle
  R6:
