task_id: ue_task_0077
title: SPUD Persistent Runtime Restore Composite
tier: hard

instruction: |
  You are working in an Unreal Engine 5 project that uses the SPUD runtime save plugin.
  Implement SPUD's persistent runtime restore pipeline in the task-owned files.

  The project already contains the public API surface, build/module wiring, and surrounding SPUD save/load integration points.

  Runtime-created actors, World Partition roaming actors, reflected SaveGame state, and metadata-based property restore must work together across the full SPUD runtime restore pipeline.

  Implement the following behavior:

  - Runtime-spawned persistent actors are identified by stable SpudGuid values rather than transient object names.
  - References between saved runtime actors are restored to the recreated or already-existing actor instance.
  - Runtime actors that already exist because of normal world initialization are matched instead of duplicated.
  - Level-authored persistent actors destroyed during gameplay remain destroyed after restore, while runtime-spawned actors are not recorded as destroyed level actors by the subsystem-level gameplay flow.
  - `USpudState::StoreLevelActorDestroyed` is the low-level state writer for destroyed placed-actor tombstones and should record the actor identity it is given; runtime-vs-level eligibility filtering belongs in the subsystem/caller path before this state API is invoked.
  - Destroyed placed-actor records use stable level actor identity, persist through SPUD's chunked archive format, and are applied after normal actor restore.
  - Roaming actors can move between World Partition runtime cells, are stored into inactive or unloading cells, and are not duplicated when cells reload.
  - Cell cache state stays synchronized with streaming load/unload notifications, including pending unload.
  - `USpudRoamingActorSubsystem::RegisterActor` and `UnregisterActor` are low-level tracking operations: they must accept any actor supplied by the caller, dedupe repeated registrations, and leave roaming-eligibility decisions to the code paths that decide when registration should happen.
  - Actors restored near a cell boundary are clamped inside the target cell so they do not immediately hand off again.
  - Reflected SaveGame properties survive metadata slow-path restore for custom structs, supported containers, and struct arrays.
  - Runtime-only reflected fields that are not marked SaveGame must not be pulled into nested SaveGame struct state.

  Use the existing SPUD subsystem, state, property metadata, runtime actor component, and roaming actor subsystem architecture.
  Do not add a separate global registry, do not special-case the test actor names, do not replace SPUD with raw UObject::Serialize,
  and do not change project/build configuration files.

