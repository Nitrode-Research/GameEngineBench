tests:
  runner: ue_automation
  mode: listen_server
  num_clients: 1
  filter: "GASShooter.AttributesDamage"

hidden_requirements:
  R1:
    text: Health, shield, mana, stamina, move speed, experience, ammo reserves, and max values must initialize and clamp through GAS attributes.
    category: attributes
  R2:
    text: Damage must resolve through GAS execution and attribute hooks rather than direct local health mutation.
    category: damage
  R3:
    text: Shield must absorb damage before health where applicable, and lethal damage must drive death or knockdown flow.
    category: damage
  R4:
    text: Attribute changes must preserve useful effect context including source, target, instigator, causer, and affected actor when available.
    category: context
  R5:
    text: Replicated attribute updates must notify UI and floating status bars through the same observable path as local changes.
    category: replication
  R6:
    text: Async attribute listeners must report old/new values and unregister safely when ended or garbage-collected.
    category: async_task
  R7:
    text: Async gameplay tag listeners must fire on watched tag add/remove events and clean up safely.
    category: async_task
  R8:
    text: Ammo reserve and maximum values must remain coherent with weapon and pickup systems.
    category: ammo
  R9:
    text: >
      In PostGameplayEffectExecute, the non-damage Health/Mana/Stamina/Shield clamp branches must
      suppress no-op writes instead of calling the setter unconditionally (stock GASShooter calls
      SetHealth(FMath::Clamp(GetHealth(), 0.0f, GetMaxHealth())) every time). Because these attributes
      replicate with REPNOTIFY_Always, an unconditional setter re-broadcasts a change even when the
      value is already in range, spamming UI/floating-bar listeners. Compute the clamped value into a
      local and only call the setter when it differs from the current value, guarding the write with
      the same FMath::IsNearlyEqual no-op convention this attribute set already uses in
      AdjustAttributeForMaxChange. The Health branch must contain the guard expression
      "!FMath::IsNearlyEqual(CurrentHealth, ClampedHealth)". An unconditional clamp/setter is graded a
      failure.
    category: edge_case

test_requirements:
  GASShooter.AttributesDamage.attribute_clamp_and_damage_hooks_present:
    - R1
    - R2
    - R3
    - R4
    - R9
  GASShooter.AttributesDamage.async_listener_cleanup_paths_present:
    - R6
    - R7
  GASShooter.AttributesDamage.ammo_and_replication_notification_paths_present:
    - R5
    - R8
