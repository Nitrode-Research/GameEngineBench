task_id: ue_task_0097
title: Implement customization attachment module assembly
tier: hard

instruction: |
  Implement the customization attachment module system so character cosmetic
  parts are assembled from data assets at runtime.
  
  Expected behavior:
  - A customization module can load the selected cosmetic part from the existing data assets.
  - Meshes, attachments, and child components are attached to the correct parent component and socket.
  - Switching a selection removes or hides the previous part without orphaned components.
  - Dependent attachments update when their parent module changes.
  - Invalid assets, missing sockets, hidden parts, and absent mesh components fail safely.
  - Runtime application and editor-preview usage both derive world and component context from the owning actor.
  - Reapplying the same selection is idempotent and does not duplicate components.
  - The implementation must compile and fit the existing customization loader, asset, and save-data architecture.
  
  Constraints:
  - Use the repository to infer module ownership, socket naming, component lifetime, save/load flow, and mesh attachment patterns.
  - Do not hardcode a fixed list of cosmetics or create unrelated preview-only components.
  - Do not require new assets or hidden manual setup.
  
  Quality bar:
  The implementation must be data-driven, safe across repeated reapplication,
  and compatible with both runtime customization and editor-preview usage.

