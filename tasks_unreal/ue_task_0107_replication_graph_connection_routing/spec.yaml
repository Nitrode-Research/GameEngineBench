task_id: ue_task_0107
title: Implement replication graph connection routing and relevancy
tier: hard

instruction: |
  Implement the project replication graph routing so multiplayer actor relevancy
  behaves correctly under real gameplay conditions.
  
  Expected behavior:
  - Connection-specific always-relevant actors are routed to the correct clients.
  - Player controllers, player states, pawns, and gameplay-critical actors remain visible to the clients that require them.
  - Spatialized actors are routed through the existing grid or frequency buckets as appropriate.
  - Streaming-level or map-specific actor lists update when client visibility changes.
  - Team, faction, or owner-only relevancy rules are respected where the existing project architecture requires them.
  - Actor add/remove, dormancy, teardown, and connection cleanup do not leave stale replication graph entries.
  - The implementation handles listen server and dedicated server modes.
  - The implementation must compile and fit Unreal's ReplicationGraph lifecycle and the project's networking settings.
  
  Constraints:
  - Use the repository to infer actor class policies, connection managers, replication graph nodes, config settings, and multiplayer lifecycle rules.
  - Do not replace the graph with a trivial always-relevant-for-everyone solution.
  - Do not require new assets or hidden manual setup.
  
  Quality bar:
  The implementation must be multiplayer-correct under real connection,
  streaming, teardown, and relevancy changes. Compile success alone is not
  sufficient.

