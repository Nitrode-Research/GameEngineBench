    category: lifecycle
  R5:
    text: Waiting for start/login input captures the intended keys and resumes initialization for the correct user.
    category: lifecycle
  R6:
    text: >-
      During user-initialize login handling, a non-primary local player whose platform login
      fails or collides with the primary player's net id must fall back to a guest identity when
      guest login is permitted: create a guest net id (e.g. GuestPlayer<index>), mark the user as a
      guest, and continue with a local profile instead of failing initialization. A reconstruction
      that omits this guest fallback fails this requirement.
    category: lifecycle
  R7:
    text: Multiple local players are bounded by max-local-player and platform trait rules.
    category: ui
  R8:
