task_id: ue_task_0052
title: ALSXT GAS Ability Async Tasks
tier: hard

instruction: |
  TargetVector's ALSXT plugin includes several Gameplay Ability System ability tasks and Blueprint async action nodes. Implement these tasks and async nodes in the task-owned files.

  Abilities must be able to receive tick events, perform targeting traces, wait for enhanced input, react to gameplay tag count changes, observe attribute changes, track cooldown begin/end state, and report gameplay effect stack changes.

  The implementation must satisfy the following behavior:

  - Tick ability tasks must enable ticking and broadcast delta time each tick while respecting normal ability-task lifecycle.
  - Enhanced-input tasks must store the requested input action and trigger event, bind through the owning player controller's enhanced input component, broadcast received values, support trigger-once behavior, and clear bindings on destroy.
  - Targeting tasks must perform avatar-based line traces and broadcast `FGameplayAbilityTargetData_SingleTargetHit` handles for hit and miss results.
  - Gameplay-tag wait tasks must optionally fire at activation, register `AnyCountChange` callbacks, broadcast added/removed counts with deltas, and honor trigger-once behavior.
  - Attribute async nodes must register and remove value-change delegates for one or many attributes and broadcast old/new values.
  - Cooldown async nodes must register active-effect and cooldown-tag delegates, distinguish predicted and server cooldowns, broadcast begin/end events, and calculate the longest remaining cooldown duration.
  - Effect-stack async nodes must register add/remove/stack-change delegates, broadcast stack count changes, and clean up delegates when ended.

