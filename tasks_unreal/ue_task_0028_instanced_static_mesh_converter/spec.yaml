task_id: ue_task_0028
title: Instanced Static Mesh Converter
tier: medium

instruction: |
  Bomber includes an InstancedStaticMeshConverter plugin that converts actors and individual meshes into reusable instanced static mesh components. Implement the converter actor behavior in the task-owned files.

  The converter must create and cache instanced static mesh components, add instances from either a raw static mesh or an actor Blueprint, and clean up instances when reset or destroyed.

  The implementation must satisfy the following behavior:

  - Direct mesh spawning must reuse an existing instanced static mesh component for the same mesh when possible.
  - New instanced components must be registered, attached to the actor root, assigned the source mesh, and excluded from navigation influence.
  - Actor-blueprint conversion must spawn a temporary actor, inspect its visible non-hidden static mesh components, cache their meshes and relative transforms, and destroy the temporary actor.
  - Actor-blueprint instances must combine cached relative mesh transforms with the requested spawn transform and add them in world space.
  - Material slots from source static mesh components must be copied to the generated instanced components.
  - Dynamic material instances must be resolved to their parent material before marking the material usable with instanced static meshes.
  - Reset and destruction must clear generated instances and drop cached blueprint mesh data without leaking temporary actors.

files_to_edit:
  - Plugins/InstancedStaticMeshConverter/Source/InstancedStaticMeshConverter/Private/InstancedStaticMeshActor.cpp
  - Plugins/InstancedStaticMeshConverter/Source/InstancedStaticMeshConverter/Public/InstancedStaticMeshActor.h

