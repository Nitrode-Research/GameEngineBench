hidden_requirements:
  R1:
    text: The server can add inventory item definitions and create item instances from them.
    category: replication
  R2:
    text: Item instances initialize their definition-derived fragments and stat tags.
    category: lifecycle
  R3:
    text: Inventory entries replicate to clients (an added entry must mark the fast array dirty via MarkItemDirty so the add replicates) and remain usable by UI, quickbar, and equipment systems.
    category: replication
  R4:
    text: Removing an item cleans up the replicated entry (the removal must mark the array dirty via MarkArrayDirty so it replicates) without invalidating unrelated items.
    category: replication
  R5:
    text: Stack counts or entry counts are updated consistently when the same item is granted multiple times.
    category: core_logic
  R6:
    text: Item stats are queryable by gameplay tag and return safe defaults for missing tags.
    category: core_logic
  R7:
    text: Client-side attempts to mutate inventory are ignored or routed through the existing server-authoritative path.
    category: replication
  R8:
    text: Pickup actors, quickbar assignment, and equipment activation continue to use the same item instances.
    category: ui
  R9:
    text: The implementation must compile and fit the existing replicated inventory and item-definition architecture.
    category: replication
  R10:
    text: "Item counting and consumption must be mutually consistent: ConsumeItemsByDefinition(GetTotalItemCountByDefinition(Def)) must succeed. Whatever total the count query reports for a definition must be exactly consumable -- a stack-aware count paired with an entry-based consume (or vice versa) that cannot consume the reported total is a failure."
    category: core_logic

test_requirements:
  ECR.InventoryItems.source_contract_tokens_present:
    - R1
    - R2
    - R3
    - R4
    - R5
    - R6
    - R7
    - R8
    - R9
  ECR.InventoryItems.consume_matches_reported_count:
    - R5
    - R10
