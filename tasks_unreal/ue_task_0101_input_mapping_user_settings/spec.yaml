task_id: ue_task_0101
title: Implement input mapping registration and user settings
tier: hard

instruction: |
  Implement the input mapping and user settings integration so player controls,
  rebinding, and platform-specific input configuration behave correctly.
  
  Expected behavior:
  - Default mappable input configs register with local settings and apply to the local player at the correct pawn initialization point.
  - Active and inactive input configs are tracked consistently by input type and config identity.
  - Mapping contexts are added to Enhanced Input with the intended priorities and removed cleanly when no longer active.
  - User-remapped keys are saved, restored, and applied without losing default mappings.
  - Invalid configs, missing mapping contexts, duplicate registrations, and unavailable user settings fail safely.
  - CommonGame input-key display data reflects current mappings and platform-specific key glyph rules.
  - Pawn possession, respawn, and local-player changes do not duplicate mappings or leave stale contexts.
  - The implementation must compile and fit the existing Enhanced Input, local settings, pawn control, and CommonGame input architecture.
  
  Constraints:
  - Use the repository to infer mappable config pairs, local settings storage, key display behavior, and pawn initialization timing.
  - Do not hardcode key bindings or bypass Enhanced Input user settings.
  - Do not require new assets or hidden manual setup.
  
  Quality bar:
  The implementation must preserve user customization and lifecycle correctness.
  A solution that only applies default mappings but loses remaps, duplicates
  contexts, or breaks key display is not sufficient.

