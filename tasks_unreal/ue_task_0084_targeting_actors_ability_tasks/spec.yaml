tests:
  runner: ue_automation
  mode: listen_server
  num_clients: 1
  filter: "GASShooter.TargetingTasks"

hidden_requirements:
  R1:
    text: Target actors must support repeated targeting without stale actors, leaked delegates, orphaned reticles, or persistent invalid state.
    category: lifecycle
  R2:
    text: Line and sphere traces must produce target data with meaningful hit results, trace start/end values, and source context.
    category: targeting
  R3:
    text: Camera-viewpoint targeting must aim toward the player view while clipping to the ability range.
    category: targeting
  R4:
    text: >-
      Spread accumulation, aiming modifiers, persistent hit results, and debug traces must work without corrupting normal confirmation.
      When the aiming-spread modifier inspects the owning actor's gameplay tags, it must obtain the ability system component through
      the project's typed ASC accessor (the same UGSAbilitySystemComponent helper used elsewhere to resolve an ASC from an actor),
      not by dereferencing the raw actor-info AbilitySystemComponent pointer.
    category: targeting
  R5:
    text: Interaction target tasks must find valid interactables through the configured collision and interface rules.
    category: interaction
  R6:
    text: Client-produced target data must be sent to the server once and consumed without duplicate callbacks or duplicate gameplay effects.
    category: replication
  R7:
    text: Montage ability tasks must report blend-out, completion, interruption, cancellation, and gameplay events exactly once.
    category: ability_task
  R8:
    text: Mesh-specific montage tasks must integrate with the custom multi-mesh montage support.
    category: ability_task
  R9:
    text: Delay, input-with-tags, FOV interpolation, and scene-component movement tasks must finish and clean up latent work correctly.
    category: ability_task

test_requirements:
  GASShooter.TargetingTasks.trace_target_actor_paths_present:
    - R1
    - R2
    - R3
    - R4
  GASShooter.TargetingTasks.client_target_data_and_interaction_tasks_present:
    - R5
    - R6
  GASShooter.TargetingTasks.montage_and_latent_task_cleanup_paths_present:
    - R7
    - R8
    - R9
