task_id: ue_task_0098
title: Implement customization material namespace application
tier: hard

instruction: |
  Implement the customization material namespace system so selected cosmetic
  material choices are resolved and applied to character meshes correctly.
  
  Expected behavior:
  - Customization data can resolve material choices by namespace, slot, and saved selection.
  - Applying a customization updates the correct mesh material slots without disturbing unrelated slots.
  - Runtime material instances are created or reused consistently so parameter overrides affect the intended mesh only.
  - Missing namespaces, missing assets, invalid slot names, or incomplete saved data fail safely.
  - Reapplying the same customization is idempotent and does not leak duplicate dynamic materials.
  - Saved material selections can be loaded back into the same visual state.
  - The implementation must compile and fit the existing customization asset and save-data architecture.
  
  Constraints:
  - Use the repository to infer how customization assets, material namespaces, skeletal meshes, and save records are connected.
  - Do not hardcode individual character materials or build a parallel cosmetic format.
  - Do not require new assets or hidden manual setup.
  
  Quality bar:
  The implementation must preserve data-driven customization behavior, avoid
  material leaks or unintended slot overwrites, and round-trip saved selections
  through the existing customization data model.

files_to_edit:
