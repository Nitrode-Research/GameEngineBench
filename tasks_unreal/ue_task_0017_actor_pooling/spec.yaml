task_id: ue_task_0017
title: Actor Pooling
tier: medium

instruction: |
  # Actor Pooling

  This repository is a third-person action roguelike built in Unreal Engine. A pooling subsystem exists to avoid the cost of spawning and destroying short-lived actors (primarily projectiles) every frame. Implement the pooling subsystem so pooled actors are correctly reused rather than spawned fresh each time.

  ## Expected Behaviors

  ### When Pooling is Active
  - Pooling is gated by a console variable. It is disabled by default and only applies to standalone (non-networked) sessions; multiplayer sessions always fall back to normal spawn/destroy.
  - When pooling is enabled, requesting a pooled actor must not spawn a new instance if a recycled instance of the correct class is already available in the pool — one of the waiting instances is reused instead.
  - When pooling is disabled, spawning and releasing fall back to the standard engine spawn and destroy calls — the rest of the game must continue to work correctly without pooling.

  ### Acquiring an Actor from the Pool
  - The pool stores available actors per class. When an actor is requested, the subsystem checks whether any free instance of that class is waiting.
  - If a free instance exists: it is removed from the pool, repositioned to the requested transform, and its instigator and owner are updated to match the spawn parameters.
  - Collision is re-enabled and the actor is made visible again before it is handed back to the caller.
  - The actor's begin-play logic must re-execute so it can reset its internal state as if it were freshly spawned. This includes both the engine-level begin-play dispatch and a pool-specific lifecycle callback that poolable actors implement for any additional reset logic.
  - If no free instance is available, a brand-new actor is spawned and returned — the caller cannot tell the difference.

  ### Releasing an Actor Back to the Pool
  - When a pooled actor finishes its job (e.g. projectile impact), it is returned to the pool rather than destroyed.
  - Before the actor is stored, collision is disabled and it is hidden so it has no effect on the world while waiting.
  - An end-play notification is routed through the actor so components clean up (e.g. particle effects stop). A pool-specific lifecycle callback gives the actor a chance to do pool-specific teardown.
  - The actor is then added to the pool's free list for its class, ready to be reused.

  ### Pool Priming
  - The subsystem supports pre-warming a pool with a set number of actors of a given class. This avoids any first-frame hitches when projectiles first fire.
  - Priming spawns actors and immediately releases them to the pool using the normal release path.

  ### Widget Pool
  - The subsystem also owns a widget pool used by the damage-number UI system. It must be initialized with a world reference during subsystem startup and fully released during shutdown.

  ## Quality Bar

  The implementation must be transparent to the rest of the game — callers must see identical behavior to spawn/destroy when pooling is disabled, and dramatically reduced allocation overhead when pooling is enabled. The pool must be keyed per class so different actor classes never receive the wrong type. Pool-specific lifecycle callbacks must fire in the correct order relative to the engine lifecycle calls so pooled actors do not have stale VFX, timers, or movement state when reused. No new classes or assets are required — implement the behavior within the existing file structure.

hidden_requirements:
  R1:
    text: Actor pooling must be controlled by the game.ActorPooling console variable, default disabled, and enabled only in standalone worlds.
    category: defaults
  R2:
    text: When pooling is enabled, the subsystem must reuse a free actor of the requested class instead of spawning a new one.
    category: object_lifecycle
  R3:
    text: When pooling is disabled, pooled spawn and release calls must fall back to normal spawn and destroy behavior without storing actors.
    category: object_lifecycle
  R4:
    text: The available actor pool must be keyed by actor class so different actor classes never share free instances.
    category: object_lifecycle
  R5:
    text: Acquiring a reused actor must remove it from the class free list, move it to the requested transform, and update owner and instigator.
    category: object_lifecycle
  R6:
    text: Acquiring a reused actor must make it visible, re-enable collision, reroute begin-play behavior, and call the pool-specific begin callback.
    category: object_lifecycle
  R7:
    text: Acquiring from an empty class pool must spawn and return a fresh actor.
    category: object_lifecycle
  R8:
    text: Releasing a pooled actor must keep it valid, hide it, disable collision, and avoid destroying it.
    category: object_lifecycle
  R9:
    text: Releasing a pooled actor must route engine end-play behavior and call the pool-specific end callback before storing it.
    category: object_lifecycle
  R10:
    text: Releasing a pooled actor must add it to the free list for its exact class.
    category: object_lifecycle
  R11:
    text: Priming a pool must spawn the requested count and immediately release those actors through the normal pool release path.
    category: object_lifecycle
  R12:
    text: The actor pooling interface must expose pool begin and end lifecycle callbacks for reusable actor reset and cleanup.
    category: object_lifecycle
  R13:
    text: The subsystem must initialize its widget pool with the world during subsystem startup and release widget resources during shutdown.
    category: object_lifecycle

