    text: >
      Spawned cosmetic actors that are player-owned tagged actors must be wired to
      the owning pawn's player state, both when first spawned and whenever the
      applied entries are refreshed, using the project's existing player-owned
      tagged actor API (AECRPlayerOwnedTaggedActor::SetPlayerState) rather than
      treating the spawned child actor as an opaque AActor. The
      UpdatePlayerStateOnEntries path must perform this propagation and must not
