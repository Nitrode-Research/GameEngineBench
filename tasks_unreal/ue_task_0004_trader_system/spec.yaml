task_id: ue_task_0004
title: Trader System
tier: hard

instruction: |
  # Task: Trader System

  ## Context

  You are working on a cooperative horde-survival game built in Unreal Engine 5
  with C++. The game supports 1–4 players on a dedicated server.

  The following behaviors must work correctly in multiplayer.

  ## What must work

  ### Trader interaction

  - The trader is a world actor that players can interact with.
  - On first interaction, the trader plays a welcome animation and sound
    visible and audible to all connected players.
  - Interacting opens a purchase UI on the local player's screen only.
    Other players are not affected.
  - The trader is only interactable during the pause phase between rounds.
    During an active round, the interaction prompt must reflect that it is
    unavailable.

  ### Purchase flow

  - The purchase UI displays available items with their prices.
  - The player's current money balance is visible in the UI.
  - When the player selects an item to buy, the request goes to the server.
  - The server validates that the player has sufficient funds and that the
    match is in the correct phase.
  - A valid purchase deducts the cost from the player's money and adds the
    item to their inventory. Both operations happen on the server.
  - If the player cannot afford an item, nothing happens.

  ### Lobby character trade

  - During the lobby, players can initiate a character swap with another
    player. A pending trade shows both players' character portraits and a
    countdown timer. The target player can accept or decline.

  ## Quality bar

  - Interacting with the trader during a pause phase opens the UI for the
    local player; no other player's screen is affected.
  - Buying an item the player can afford deducts money and adds the item;
    buying one they cannot afford has no effect on money or inventory.
  - The trader UI shows the correct current money balance.
  - Interacting during an active round does not open the UI.
  - The lobby character trade widget shows the correct character portraits
    and countdown for both players involved in the trade.

hidden_requirements:
  R1:
    text: Trader money and trade state must replicate, purchase and trade requests must be server RPCs, and welcome feedback must multicast to clients.
    category: replication
  R2:
    text: Trader interaction info must advertise talking to the trader and require a timed hold.
    category: core_logic
  R3:
    text: Affordable purchases must deduct the item price and add the item, while unaffordable purchases must leave money and inventory unchanged.
    category: authority
  R4:
    text: Character trades must record instigator and target, start a countdown, support accept and decline paths, and clear state after completion.
    category: object_lifecycle
  R5:
    text: Expired character trades must abort and reset timer, instigator, target, and countdown state.
    category: object_lifecycle
  R6:
    text: Zombie kill rewards must add the correct money amount, track total kills, and track headshots separately.
    category: core_logic

