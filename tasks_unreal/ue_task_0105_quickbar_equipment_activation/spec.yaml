task_id: ue_task_0105
title: Implement replicated quickbar equipment activation
tier: hard

instruction: |
  Implement the quickbar equipment activation system so player equipment behaves
  correctly in multiplayer.
  
  Expected behavior:
  - A player can add equipment-backed items to quickbar slots and activate a slot by index.
  - Only one quickbar slot is active for a given activation channel at a time.
  - Activating a slot equips the referenced item through the existing equipment system.
  - Deactivating or replacing the active slot unequips the previous equipment cleanly.
  - Empty slots, invalid indexes, duplicate slot assignments, and missing item instances are handled safely.
  - Quickbar slot contents, active indexes, and spawned equipment state replicate to clients.
  - Client requests are forwarded to the server; the server remains authoritative for gameplay state.
  - UI and gameplay listeners are notified when quickbar contents or active equipment change.
  - Character teardown removes equipped items without leaving spawned actors, abilities, or replicated stale state behind.
  - The implementation must compile and fit the existing inventory, equipment, ability, and component architecture.
  
  Constraints:
  - Use the repository to infer lifecycle rules, replication patterns, gameplay messages, equipment integration, and expected authority checks.
  - Do not replace the system with a toy local-only quickbar.
  - Do not require new assets or hidden manual setup.
  
  Quality bar:
  The implementation must be production-quality and multiplayer-correct. It
  should work on a listen server with at least one client, preserve existing
  UI/gameplay integration, and avoid breaking unrelated inventory or equipment
  behavior.

