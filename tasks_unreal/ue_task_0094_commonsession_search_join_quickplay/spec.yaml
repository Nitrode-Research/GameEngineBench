task_id: ue_task_0094
title: Implement CommonSession search, join, quickplay, and invites
tier: hard

instruction: |
  Implement CommonSession search, join, quickplay, and invite handling so players
  can discover and enter sessions through the existing online flow.
  
  Expected behavior:
  - Search requests query the correct online mode and populate wrapped search results for UI and gameplay code.
  - Search result accessors expose description, custom settings, open connection counts, max players, and ping safely.
  - Quickplay first searches with the intended filters and hosts a fallback session only when joining is not possible.
  - Joining a session registers the local player, resolves the connect string or lobby target, and travels correctly.
  - Join, search, quickplay, and invite/session-request failures broadcast useful result information.
  - Accepted platform invites or lobby join requests notify listeners with the correct platform user and requested session data.
  - Cleanup, map travel failure, and post-load handling do not leave stale pending join/search state.
  - The implementation must compile and fit the existing CommonSession, online subsystem, UI, and travel architecture.
  
  Constraints:
  - Use the repository to infer search settings, result wrapping, quickplay fallback logic, join completion delegates, and invite handling.
  - Do not implement a toy direct-IP join path or always-host quickplay.
  - Do not require new assets or hidden manual setup.
  
  Quality bar:
  The implementation must handle real online-session lifecycle behavior. It
  should be correct for empty search results, failed joins, accepted invites,
  travel failures, and cleanup after map loads.

files_to_edit:
  - Plugins/CommonUser/Source/CommonUser/Private/CommonSessionSubsystem.cpp
  - Plugins/CommonUser/Source/CommonUser/Public/CommonSessionSubsystem.h

tests:
  runner: ue_automation
  mode: listen_server
  num_clients: 1
  filter: "ECR.CommonSessionSearch"

