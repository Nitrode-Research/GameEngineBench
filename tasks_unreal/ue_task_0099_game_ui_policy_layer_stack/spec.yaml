task_id: ue_task_0099
title: Implement game UI policy and layer stack behavior
tier: hard

instruction: |
  Implement the game UI policy and layer stack so screens, dialogs, and async
  widget pushes route through the correct player-owned UI layout.
  
  Expected behavior:
  - Each local player receives the correct root layout and UI policy state.
  - UI content can be pushed to named layers and removed without corrupting other layers.
  - Async widget creation and async layer pushes complete or cancel safely when players, worlds, or layouts change.
  - Confirmation dialogs and error dialogs use the existing messaging subsystem and return results to callers.
  - UI extension helpers find the correct local player, controller, layout, and layer without relying on global state.
  - Split-screen or multiple local-player scenarios do not route UI to the wrong player.
  - Teardown removes widgets, cancels pending async work, and avoids stale callbacks.
  - The implementation must compile and fit the existing CommonGame, CommonUI, local player, and game instance architecture.
  
  Constraints:
  - Use the repository to infer UI policy ownership, primary layout behavior, layer names, async action lifecycle, and messaging flow.
  - Do not create a parallel HUD stack or hardcode a single global viewport widget.
  - Do not require new assets or hidden manual setup.
  
  Quality bar:
  The implementation must be UI-lifecycle-safe. It should handle async widget
  loading, player/layout replacement, cancellation, and layer routing without
  leaking widgets or sending UI to the wrong local player.

