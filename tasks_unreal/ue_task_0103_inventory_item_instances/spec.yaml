task_id: ue_task_0103
title: Implement replicated inventory item instances and stat fragments
tier: hard

instruction: |
  Implement the inventory item instance system so runtime item ownership,
  replicated entries, and item stats behave correctly.
  
  Expected behavior:
  - The server can add inventory item definitions and create item instances from them.
  - Item instances initialize their definition-derived fragments and stat tags.
  - Inventory entries replicate to clients and remain usable by UI, quickbar, and equipment systems.
  - Removing an item cleans up the replicated entry without invalidating unrelated items.
  - Stack counts or entry counts are updated consistently when the same item is granted multiple times.
  - Item stats are queryable by gameplay tag and return safe defaults for missing tags.
  - Client-side attempts to mutate inventory are ignored or routed through the existing server-authoritative path.
  - Pickup actors, quickbar assignment, and equipment activation continue to use the same item instances.
  - The implementation must compile and fit the existing replicated inventory and item-definition architecture.
  
  Constraints:
  - Use the repository to infer how item definitions, fragments, gameplay tags, pickup actors, and equipment references are expected to interact.
  - Do not implement a separate local inventory model.
  - Do not require new assets or hidden manual setup.
  
  Quality bar:
  The implementation must preserve stable runtime item identity, multiplayer
  replication, and compatibility with pickup, quickbar, equipment, and UI code.

