    category: component_lifecycle
  R2:
    text: Direct static mesh spawning must append transforms as instances on the cached component.
    category: instancing
  R3:
    text: Actor-blueprint conversion must cache visible non-hidden static mesh components from a temporary spawned actor.
    category: actor_conversion
  R4:
    text: Actor-blueprint conversion must preserve each source component's relative transform and combine it with the requested actor instance transform in world space.
    category: transform_semantics
  R5:
    text: Generated instanced components must copy source component materials and mark parent materials as usable with instanced static meshes.
    category: material_handling
  R6:
    text: Actor conversion must reuse cached blueprint mesh data rather than spawning and inspecting the blueprint every time.
    category: caching
  R7:
    text: Reset and destruction must clear all generated instances and empty cached blueprint mesh data.
    category: cleanup
  R8:
    text: Temporary spawned actors used for component discovery must be destroyed after cache construction.
    category: cleanup

