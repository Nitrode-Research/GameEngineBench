task_id: ue_task_0104
title: Implement pawn extension and player initialization flow
tier: hard

instruction: |
  Implement the pawn initialization flow so player-controlled pawns receive the
  correct data, components, abilities, input, and ready-state transitions.
  
  Expected behavior:
  - Pawn extension components coordinate initialization state across pawn, controller, player state, and ability system.
  - Pawn data is applied at the correct lifecycle point for both initially spawned and respawned pawns.
  - Ability system ownership and avatar actor references are initialized and cleared correctly.
  - Default abilities, input bindings, camera setup, and gameplay components are granted only when prerequisites are ready.
  - Client and server initialization paths converge without duplicate grants or missing client-side setup.
  - Possession, unpossession, death, respawn, and seamless travel do not leave stale initialization state.
  - Initialization state changes notify dependent components through the existing component manager pattern.
  - The implementation must compile and fit the existing pawn, hero component, player controller, player state, and GAS architecture.
  
  Constraints:
  - Use the repository to infer lifecycle state names, component manager usage, pawn data flow, and authority/client responsibilities.
  - Do not collapse initialization into BeginPlay-only setup.
  - Do not require new assets or hidden manual setup.
  
  Quality bar:
  The implementation must be lifecycle-correct. It should handle possession and
  respawn paths without double-granting abilities, missing input on clients, or
  leaving stale ability system avatar references.

