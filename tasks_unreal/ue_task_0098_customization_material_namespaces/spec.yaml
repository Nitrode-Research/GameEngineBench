  - Source/ECRCommon/Private/Customization/CustomizationMaterialLoaderComponent.cpp
  - Source/ECRCommon/Private/Customization/CustomizationMaterialNameSpace.cpp
  - Source/ECRCommon/Private/Customization/CustomizationSavingNameSpace.cpp
