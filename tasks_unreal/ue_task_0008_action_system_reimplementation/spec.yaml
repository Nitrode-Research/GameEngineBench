coverage_policy:
  harness_limited_groups:
    - Thorns (Reflect) Effect
    - Player Projectile Attack
    - AI Melee Attack
    - AI Ranged Attack
  min_direct_group_ratio: 0.6
  partial_group_weight: 0.5
  allow_none_in_harness_limited: true

tests:
  runner: ue_automation
  mode: listen_server
  num_clients: 1
  filter: "ActionRoguelike.ActionSystem"
