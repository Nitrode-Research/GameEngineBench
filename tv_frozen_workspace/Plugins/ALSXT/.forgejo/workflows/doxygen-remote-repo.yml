name: Deploy Doxygen to External Repo

on:
  push:
    branches:
      - stable  # Trigger on pushes to the main branch

jobs:
  generate-doxygen-remote:
    runs-on: codeberg-tiny
    steps:
      # 1. Checkout the source code
      - name: Checkout Source
        uses: actions/checkout@v4

      # 2. Install Doxygen and dependencies
      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      # 3. Generate HTML Documentation
      # This creates the folder even if it is ignored in your git repo
      - name: Generate Docs
        run: doxygen Doxyfile

      # 4. Deploy to External Repository
      - name: Deploy to Target Repo
        uses: orhun/git-cliff-action@latest
        with:
          # Use a Personal Access Token (PAT) stored in Forgejo Secrets
          token: ${{ secrets.DOXYGEN_REPO_PAT }}
          # The external repository name (e.g., username/jekyll-site-repo)
          repository-name: Voidware-Prohibited/alsxt.github.io
          # The branch in the target repository (usually gh-pages or main)
          branch: stable
          # The local folder generated by Doxygen (adjust to match your Doxyfile)
          folder: docs
          # The subdirectory within the target repo (e.g., docs/api)
          target-folder: docs
          # Prevent the action from deleting existing files in the target repo
          clean: false