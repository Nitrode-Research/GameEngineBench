task_id: ue_task_0091
title: Implement camera mode stack and penetration avoidance
tier: hard

instruction: |
  Implement the camera mode system so player view modes blend correctly and the
  third-person camera avoids world penetration.
  
  Expected behavior:
  - Camera modes can be pushed, blended, evaluated, and removed using the existing camera component architecture.
  - The active camera produces correct view location, rotation, field of view, and control rotation behavior.
  - Camera mode blend weights progress over time and produce stable transitions without jumps.
  - Third-person camera offsets account for crouch, character state, and target offsets defined by existing data.
  - Penetration avoidance prevents the camera from clipping through world geometry or blocking actors.
  - Camera collision feelers use the existing trace channels, ignore lists, and blocked-hit behavior.
  - UI or static camera modes can take over and then restore gameplay camera state cleanly.
  - The implementation must compile and fit the existing player camera manager, camera component, pawn, and input architecture.
  
  Constraints:
  - Use the repository to infer camera mode lifecycle, stack evaluation order, blend functions, assist interfaces, and collision feeler behavior.
  - Do not replace the stack with a single hardcoded camera.
  - Do not require new assets or hidden manual setup.
  
  Quality bar:
  The implementation must feel correct at runtime, not just compile. It should
  support smooth transitions, correct local-player camera ownership, and robust
  camera penetration avoidance in real maps.

