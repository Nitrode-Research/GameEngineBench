task_id: ue_task_0092
title: Implement replicated character parts cosmetics
tier: hard

instruction: |
  Implement the character parts cosmetic system so modular pawn visuals are
  applied, removed, and replicated correctly.
  
  Expected behavior:
  - Gameplay code can add and remove character part entries through the existing controller or pawn component path.
  - Character parts spawn or attach the correct visual actors, meshes, or components to the owning pawn.
  - Part handles remain stable enough for callers to remove the intended part later.
  - Cosmetic entries replicate so clients see the same character composition as the server.
  - Removing or replacing a part cleans up spawned cosmetic actors and components without orphaned visuals.
  - Pawn changes, possession changes, respawn, and teardown reapply or clear cosmetics safely.
  - Animation style, cosmetic tags, and body-type data remain available to systems that query them.
  - The implementation must compile and fit the existing controller component, pawn component, cosmetic statics, and replication architecture.
  
  Constraints:
  - Use the repository to infer character part list ownership, replication callbacks, actor/component spawning, and pawn lifecycle rules.
  - Do not hardcode a fixed set of cosmetics or bypass replicated part entries.
  - Do not require new assets or hidden manual setup.
  
  Quality bar:
  The implementation must be multiplayer-visible and lifecycle-safe. It should
  survive pawn replacement and repeated add/remove operations without duplicate
  visuals, stale handles, or client/server divergence.

