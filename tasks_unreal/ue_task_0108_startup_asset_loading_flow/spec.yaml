task_id: ue_task_0108
title: Implement startup asset loading and game instance boot flow
tier: hard

instruction: |
  Implement the startup asset loading and game instance boot flow so the game
  initializes runtime configuration and required assets in the correct order.
  
  Expected behavior:
  - Startup jobs run in the intended order and report progress without blocking the game indefinitely.
  - Primary assets needed for maps, pawn data, gameplay systems, and startup configuration are discovered and loaded through the existing asset manager path.
  - Game instance startup initializes online, local player, and gameplay systems at the correct lifecycle points.
  - Default pawn data and startup configuration are available before player pawn setup depends on them.
  - Missing or invalid assets fail with useful errors while preserving a safe boot path where possible.
  - Async loading handles cancellation, teardown, and map changes without stale callbacks.
  - Client, listen server, and server startup paths initialize only the systems appropriate for their mode.
  - The implementation must compile and fit the existing asset manager, startup job, game instance, local player, and pawn data architecture.
  
  Constraints:
  - Use the repository to infer primary asset types, startup job sequencing, game instance lifecycle, and pawn data usage.
  - Do not replace the startup flow with hardcoded asset loads or BeginPlay-only initialization.
  - Do not require new assets or hidden manual setup.
  
  Quality bar:
  The implementation must boot reliably and preserve ordering-sensitive
  initialization. Compile success is not sufficient if pawn data, startup asset
  loading, local-player setup, or boot progress behavior is wrong at runtime.

