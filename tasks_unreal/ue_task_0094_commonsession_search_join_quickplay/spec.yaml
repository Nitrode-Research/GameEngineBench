  R9:
    text: >-
      Online delegate setup (OSSv1) must register an accepted-invite handler on the
      session interface (AddOnSessionUserInviteAcceptedDelegate_Handle) so that accepted
      platform invites / external join requests are received and surfaced to listeners
      with the correct platform user and requested session. A reconstruction that binds
      the create/find/join delegates but omits the invite-accepted delegate never
      receives invites and fails this requirement.
    category: subsystem_architecture

