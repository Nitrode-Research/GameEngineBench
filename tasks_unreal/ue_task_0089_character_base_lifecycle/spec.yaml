    category: startup_effects
  R7:
    text: Startup effects must be authority-only, one-shot guarded, sourced from the character, applied to the ASC, and mark startup effects applied.
    category: startup_effects
  R8:
    text: Damage numbers must queue entries, drive a timer, create/register/attach damage text components, set text, remove entries, and clear the timer when done.
    category: ui_feedback
  R9:
    text: Attribute setters must update GSAttributeSetBase when present.
    category: attributes

